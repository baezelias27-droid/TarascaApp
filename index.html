<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App de Actividades</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="app-header">
      <div class="logo-box">
        <img src="logo.png" class="logo" alt="Logo" />
        <h1>Mi Progreso</h1>
      </div>
      <select id="activitySelector"></select>
    </header>

    <!-- MAIN VIEW -->
    <section id="mainView" class="view">
      <div class="card">
        <h2 id="activityTitle"></h2>
        <p id="activityMeta" class="meta"></p>
        <div id="stepsContainer"></div>

        <div class="progress">
          <div class="progress-bar">
            <div id="progressFill"></div>
          </div>
          <span id="progressText"></span>
        </div>
      </div>
    </section>

    <!-- CREATE VIEW -->
    <section id="createView" class="view hidden">
      <div class="card">
        <h2>Nueva Actividad</h2>
        <input id="newActivityName" placeholder="Nombre de la actividad" />
        <div id="builderContainer"></div>
        <button id="addStepBtn" class="secondary">+ Paso</button>
        <button id="saveActivityBtn" class="primary">Guardar</button>
      </div>
    </section>

    <!-- HISTORY VIEW -->
    <section id="historyView" class="view hidden">
      <div class="card">
        <h2>Historial</h2>
        <div id="historyList"></div>
        <div id="editContainer" class="hidden"></div>
      </div>
    </section>

    <!-- NAV -->
    <div class="nav">
      <button id="btnHome" class="secondary">Inicio</button>
      <button id="btnCreate" class="primary">Nueva</button>
      <button id="btnHistory" class="secondary">Historial</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
